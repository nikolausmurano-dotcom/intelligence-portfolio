<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Proof Capsule Runner</title>
<style>
:root{color-scheme:light;--paper:#f7f5ef;--ink:#142231;--muted:#5c6673;--rule:rgba(31,49,68,.18);--accent:#744c20;--green:#2e5d47;--red:#76313a;--blue:#1e4d6b;--white:rgba(255,255,255,.92)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fbfaf6 0%,var(--paper) 42%,#efebe0 100%);color:var(--ink);font-family:Georgia,'Times New Roman',serif}main{max-width:1240px;margin:0 auto;padding:38px 22px 76px}h1{font-size:clamp(34px,5vw,58px);line-height:1;font-weight:500;margin:0 0 14px}h2{font-size:25px;line-height:1.18;margin:24px 0 10px}h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}p,li{line-height:1.58}.topline,.kicker{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--accent)}.lead{max-width:980px;font-size:18px;line-height:1.62}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}.card,.panel{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px}.panel{margin:18px 0}.ready{border-left:4px solid var(--green)}.warn{border-left:4px solid var(--accent)}.risk{border-left:4px solid var(--red)}.button{display:inline-block;border:1px solid rgba(30,77,107,.35);border-radius:6px;padding:9px 12px;background:#fff;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;text-decoration:none;margin:3px 6px 3px 0}.score{font-size:32px;line-height:1}.small{font-size:13px;color:var(--muted)}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:top}th{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}input,select{width:100%;border:1px solid var(--rule);border-radius:6px;padding:10px;background:#fff;color:var(--ink)}@media(max-width:760px){main{padding:28px 18px 58px}}
</style>

<script src="component_proof_capsules.js"></script>
<script>
function esc(s){return String(s||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const stage=document.getElementById('stage').value;
  const rows=window.COMPONENT_PROOF_CAPSULES.filter(r=>{
    const hay=[r.product_name,r.component,r.capsule_stage,r.operation_to_run,r.observable_output,r.source_candidates_applied,r.distinctiveness_check].join(' ').toLowerCase();
    return (!q||hay.includes(q)) && (!stage||r.capsule_stage===stage);
  }).slice(0,120);
  document.getElementById('count').textContent=rows.length+' shown';
  document.getElementById('rows').innerHTML=rows.map(r=>`<div class="card ${r.capsule_stage.includes('execution')?'ready':r.capsule_stage.includes('instrumented')?'warn':'risk'}"><h3>${esc(r.project_id)} / ${esc(r.capsule_stage)}</h3><h2>${esc(r.component)}</h2><p><b>Fixture:</b> ${esc(r.input_fixture)}</p><p><b>Operation:</b> ${esc(r.operation_to_run)}</p><p><b>Observable output:</b> ${esc(r.observable_output)}</p><p><b>Source use:</b> ${esc(r.source_application_summary || r.source_candidates_applied)}</p><p><b>Acceptance:</b> ${esc(r.acceptance_test)}</p><p><b>Falsifier:</b> ${esc(r.falsification_rule)}</p><p><b>Claim allowed:</b> ${esc(r.public_claim_allowed_now)}</p></div>`).join('');
}
window.addEventListener('DOMContentLoaded',()=>{render();q.addEventListener('input',render);stage.addEventListener('change',render);});
</script>
</head><body><main>
<div class="topline">Interactive proof capsule runner</div>
<h1>Inspect A Proof Capsule</h1>
<p class="lead">Search by project, mechanism, source, component, or proof class. The runner shows what the capsule proves and what evidence must be captured.</p>
<section class="grid"><div><label class="kicker" for="q">Search</label><input id="q" placeholder="Nexus, Poison-RAG, Russia, source, stale-state, retrieval..." /></div><div><label class="kicker" for="stage">Capsule stage</label><select id="stage"><option value="">All stages</option><option>execution-ready proof capsule</option><option>instrumented proof capsule awaiting live capture</option></select></div></section>
<p class="small" id="count"></p><section class="grid" id="rows"></section>
</main></body></html>
