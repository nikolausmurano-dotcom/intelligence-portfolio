<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Operational Build Runner</title>
<style>
:root{color-scheme:light;--paper:#f7f5ef;--ink:#152231;--muted:#5a6575;--rule:rgba(35,55,77,.18);--accent:#7a4d18;--blue:#1e4d6b;--green:#2f6048;--red:#7a2730;--white:rgba(255,255,255,.9)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif}main{max-width:1240px;margin:0 auto;padding:38px 22px 76px}h1{font-size:clamp(34px,5vw,56px);line-height:1;font-weight:500;margin:0 0 14px}h2{font-size:25px;line-height:1.18;margin:24px 0 10px}h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}p,li{line-height:1.58}a{color:#183f65}.topline,.kicker{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--accent)}.lead{max-width:980px;font-size:18px;line-height:1.62}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}.card,.panel,.trace{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px}.panel{margin:18px 0}.ready{border-left:4px solid var(--green)}.warn{border-left:4px solid var(--accent)}.risk{border-left:4px solid var(--red)}.button{display:inline-block;border:1px solid rgba(30,77,107,.35);border-radius:6px;padding:9px 12px;background:#fff;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;text-decoration:none;margin:3px 6px 3px 0}input,select{width:100%;border:1px solid var(--rule);border-radius:6px;padding:10px;background:#fff;color:var(--ink)}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:top}th{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}.small{color:var(--muted);font-size:13px}.score{font-size:30px;line-height:1}.tag{display:inline-block;border:1px solid var(--rule);border-radius:999px;padding:4px 8px;margin:2px;font-size:12px;background:#fff}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,.75fr);gap:14px}@media(max-width:760px){main{padding:28px 18px 58px}.split{grid-template-columns:1fr}}
</style>
</head><body><main>
<div class="topline">Operational build runner</div>
<h1>Operational Build Runner</h1>
<p class="lead">Filter projects by tranche or object type. The runner shows the final object, runtime target, core modules, source requirement, tests, current status, and first full build.</p>
<p><a class="button" href="index.html">Back to full-build control plane</a><a class="button" href="operational_build_specs.csv">Open CSV</a></p>
<section class="panel split">
  <div><label class="kicker" for="projectFilter">Project</label><select id="projectFilter"></select></div>
  <div><label class="kicker" for="search">Search</label><input id="search" placeholder="Nexus, retrieval, manuscript, SAT, Russia"></div>
</section>
<section id="summary" class="grid"></section>
<section id="rows"></section>
<script src="operational_build_specs.js"></script>
<script>
const rows = window.OPERATIONAL_BUILD_SPECS || [];
const projectFilter = document.getElementById('projectFilter');
const search = document.getElementById('search');
const summary = document.getElementById('summary');
const out = document.getElementById('rows');
projectFilter.innerHTML = '<option value="">All projects</option>' + rows.map(r => `<option value="${r.project_id}">${r.product_name}</option>`).join('');
const params = new URLSearchParams(location.search);
if (params.get('project')) projectFilter.value = params.get('project');
function escHtml(v){return String(v ?? '').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function filtered(){
  const q = search.value.trim().toLowerCase();
  return rows.filter(r => (!projectFilter.value || r.project_id === projectFilter.value) && (!q || [r.product_name,r.project_title,r.final_object_type,r.runtime_target,r.core_modules,r.operational_end_state].join(' ').toLowerCase().includes(q)));
}
function render(){
  const f = filtered();
  const tranches = {};
  const objects = {};
  for (const row of f){ tranches[row.build_tranche]=(tranches[row.build_tranche]||0)+1; objects[row.final_object_type]=(objects[row.final_object_type]||0)+1; }
  summary.innerHTML = `<div class="card"><h3>Visible Projects</h3><p class="score">${f.length}</p></div><div class="card"><h3>Tranches</h3><p>${Object.entries(tranches).map(([k,v])=>`${escHtml(k)}: ${v}`).join('<br>')}</p></div><div class="card"><h3>Object Types</h3><p>${Object.entries(objects).slice(0,8).map(([k,v])=>`${escHtml(k)}: ${v}`).join('<br>')}</p></div>`;
  const shown = f.slice(0,160);
  out.innerHTML = `<table><thead><tr><th>Project</th><th>Object / Runtime</th><th>Operational End State</th><th>Core Modules</th><th>Tests</th><th>First Build</th></tr></thead><tbody>` +
    shown.map(r => `<tr><td><strong>${escHtml(r.product_name)}</strong><br><span class="small">${escHtml(r.build_tranche)} / ${escHtml(r.proof_tier)}</span></td><td>${escHtml(r.final_object_type)}<br><span class="small">${escHtml(r.runtime_target)}</span></td><td>${escHtml(r.operational_end_state)}</td><td>${escHtml(r.core_modules)}</td><td>${escHtml(r.test_suite)}</td><td>${escHtml(r.first_full_build)}<br><span class="small">${escHtml(r.proof_to_full_build_gap)}</span></td></tr>`).join('') +
    `</tbody></table><p class="small">Showing ${shown.length} of ${f.length}. Use the CSV for full inspection.</p>`;
}
projectFilter.addEventListener('change', render);
search.addEventListener('input', render);
render();
</script>
</main></body></html>
