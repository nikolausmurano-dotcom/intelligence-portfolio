<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Full-Build Runner</title>
<style>
:root{color-scheme:light;--paper:#f7f4ec;--ink:#142231;--muted:#5c6673;--rule:rgba(31,49,68,.18);--accent:#744c20;--green:#2f6047;--red:#76313a;--blue:#214f68;--white:rgba(255,255,255,.94)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fcfbf7 0%,var(--paper) 50%,#eee8da 100%);color:var(--ink);font-family:Georgia,'Times New Roman',serif}main{max-width:1260px;margin:0 auto;padding:38px 22px 76px}h1{font-size:clamp(34px,5vw,58px);line-height:1;font-weight:500;margin:0 0 14px}h2{font-size:25px;line-height:1.18;margin:24px 0 10px}h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}p,li{line-height:1.58}.topline,.kicker{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--accent)}.lead{max-width:1020px;font-size:18px;line-height:1.62}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}.card,.panel{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px}.panel{margin:18px 0}.ready{border-left:4px solid var(--green)}.warn{border-left:4px solid var(--accent)}.risk{border-left:4px solid var(--red)}.button{display:inline-block;border:1px solid rgba(33,79,104,.35);border-radius:6px;padding:9px 12px;background:#fff;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;text-decoration:none;margin:3px 6px 3px 0}.score{font-size:32px;line-height:1}.small{font-size:13px;color:var(--muted)}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:top}th{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}input,select{width:100%;border:1px solid var(--rule);border-radius:6px;padding:10px;background:#fff;color:var(--ink)}@media(max-width:760px){main{padding:28px 18px 58px}}
</style>
</head><body><main>
<p class="topline">Interactive Full-Build Runner</p>
<h1>Project Full-Build Contracts</h1>
<p class="lead">Filter by project, build mode, promotion stage, source duty, or acceptance test. Use this to select the next operational slice to build.</p>
<div class="grid">
  <div><label>Search<input id="q" placeholder="project, mode, source, test"></label></div>
  <div><label>Build Mode<select id="mode"><option value="">All</option></select></label></div>
</div>
<section class="panel"><div id="count" class="kicker"></div><div id="rows"></div></section>
<script src="full_build_program_data.js"></script>
<script>
const fields = ['project_id','product_name','build_mode','readiness_score','promotion_stage','minimum_operational_release','source_actions_before_claim','acceptance_tests','public_claim_now'];
function esc(s){return String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
const modeSelect = document.getElementById('mode');
[...new Set((window.FULL_BUILD_CONTRACTS || []).map(r=>r.build_mode))].sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;modeSelect.appendChild(o);});
function render(){
  const q = document.getElementById('q').value.toLowerCase();
  const mode = modeSelect.value;
  let rows = (window.FULL_BUILD_CONTRACTS || []).filter(r => {
    const blob = fields.map(f => r[f]).join(' ').toLowerCase();
    return (!q || blob.includes(q)) && (!mode || r.build_mode === mode);
  });
  document.getElementById('count').textContent = rows.length + ' contracts';
  document.getElementById('rows').innerHTML = '<table><thead><tr>' + fields.map(f=>'<th>'+esc(f.replaceAll('_',' '))+'</th>').join('') + '</tr></thead><tbody>' + rows.slice(0,250).map(r=>'<tr>'+fields.map(f=>'<td>'+esc(r[f])+'</td>').join('')+'</tr>').join('') + '</tbody></table>';
}
document.getElementById('q').addEventListener('input', render);
modeSelect.addEventListener('change', render);
render();
</script>
</main></body></html>
