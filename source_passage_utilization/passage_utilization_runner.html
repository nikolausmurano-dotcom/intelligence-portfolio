<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Passage Contract Runner</title>
<style>
:root{color-scheme:light;--paper:#f7f4ec;--ink:#132230;--muted:#5e6872;--rule:rgba(26,42,58,.18);--accent:#7b4f24;--blue:#214f68;--green:#2f6047;--red:#76343a;--white:rgba(255,255,255,.94)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fcfbf7 0%,var(--paper) 48%,#eee8da 100%);color:var(--ink);font-family:Georgia,'Times New Roman',serif}main{max-width:1260px;margin:0 auto;padding:38px 22px 76px}h1{font-size:clamp(34px,5vw,58px);line-height:1;font-weight:500;margin:0 0 14px}h2{font-size:25px;line-height:1.18;margin:24px 0 10px}h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}p,li{line-height:1.58}.topline,.kicker{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--accent)}.lead{max-width:1000px;font-size:18px;line-height:1.62}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}.card,.panel{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px}.panel{margin:18px 0}.ready{border-left:4px solid var(--green)}.warn{border-left:4px solid var(--accent)}.risk{border-left:4px solid var(--red)}.button{display:inline-block;border:1px solid rgba(33,79,104,.35);border-radius:6px;padding:9px 12px;background:#fff;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;text-decoration:none;margin:3px 6px 3px 0}.score{font-size:32px;line-height:1}.small{font-size:13px;color:var(--muted)}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:top}th{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}input,select{width:100%;border:1px solid var(--rule);border-radius:6px;padding:10px;background:#fff;color:var(--ink)}@media(max-width:760px){main{padding:28px 18px 58px}}
</style>
</head><body><main>
<p class="topline">Interactive Source Utilization Runner</p>
<h1>Passage Contract Runner</h1>
<p class="lead">Filter by project, source, role, or proof capsule. Use this page to decide which source must be close-read next and what artifact it must change.</p>
<div class="grid">
  <div><label>Search<input id="q" placeholder="project, source, role, capsule"></label></div>
  <div><label>Locator Status<select id="status"><option value="">All</option><option>candidate_file_found</option><option>no_candidate_file_found</option></select></label></div>
</div>
<section class="panel"><div id="count" class="kicker"></div><div id="rows"></div></section>
<script src="source_passage_data.js"></script>
<script>
const fields = ['passage_contract_id','project_id','product_name','source_candidate','locator_status','source_role','output_it_must_change','test_or_check_it_must_govern','proof_capsules_to_update','claim_unlocked_after_close_read'];
function esc(s){return String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function render(){
  const q = document.getElementById('q').value.toLowerCase();
  const status = document.getElementById('status').value;
  let rows = (window.PASSAGE_CONTRACTS || []).filter(r => {
    const blob = fields.map(f => r[f]).join(' ').toLowerCase();
    return (!q || blob.includes(q)) && (!status || r.locator_status === status);
  });
  document.getElementById('count').textContent = rows.length + ' contracts';
  document.getElementById('rows').innerHTML = '<table><thead><tr>' + fields.map(f=>'<th>'+esc(f.replaceAll('_',' '))+'</th>').join('') + '</tr></thead><tbody>' + rows.slice(0,250).map(r=>'<tr>'+fields.map(f=>'<td>'+esc(r[f])+'</td>').join('')+'</tr>').join('') + '</tbody></table>';
}
document.getElementById('q').addEventListener('input', render);
document.getElementById('status').addEventListener('change', render);
render();
</script>
</main></body></html>
