<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Source-To-Build Runner</title>
<style>
:root{color-scheme:light;--paper:#f7f5ef;--ink:#152231;--muted:#5a6575;--rule:rgba(35,55,77,.18);--accent:#7a4d18;--blue:#1e4d6b;--green:#2f6048;--red:#7a2730;--white:rgba(255,255,255,.9)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif}main{max-width:1240px;margin:0 auto;padding:38px 22px 76px}h1{font-size:clamp(34px,5vw,56px);line-height:1;font-weight:500;margin:0 0 14px}h2{font-size:25px;line-height:1.18;margin:24px 0 10px}h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}p,li{line-height:1.58}a{color:#183f65}.topline,.kicker{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--accent)}.lead{max-width:980px;font-size:18px;line-height:1.62}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}.card,.panel{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px}.panel{margin:18px 0}.ready{border-left:4px solid var(--green)}.warn{border-left:4px solid var(--accent)}.risk{border-left:4px solid var(--red)}.button{display:inline-block;border:1px solid rgba(30,77,107,.35);border-radius:6px;padding:9px 12px;background:#fff;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;text-decoration:none;margin:3px 6px 3px 0}input,select{width:100%;border:1px solid var(--rule);border-radius:6px;padding:10px;background:#fff;color:var(--ink)}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:top}th{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}.small{color:var(--muted);font-size:13px}.score{font-size:30px;line-height:1}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,.75fr);gap:14px}@media(max-width:760px){main{padding:28px 18px 58px}.split{grid-template-columns:1fr}}
</style>
</head><body><main>
<div class="topline">Source-to-build runner</div>
<h1>Source-To-Build Runner</h1>
<p class="lead">Filter by project or search term. The runner shows how each source candidate strengthens a module, governs a test, shapes a design decision, and constrains a claim.</p>
<p><a class="button" href="index.html">Back to source-to-build bindings</a><a class="button" href="source_to_build_bindings.csv">Open CSV</a></p>
<section class="panel split">
  <div><label class="kicker" for="projectFilter">Project</label><select id="projectFilter"></select></div>
  <div><label class="kicker" for="search">Search</label><input id="search" placeholder="retrieval, source, Nexus, SAT, module, claim"></div>
</section>
<section id="summary" class="grid"></section>
<section id="rows"></section>
<script src="source_to_build_bindings.js"></script>
<script>
const rows = window.SOURCE_TO_BUILD_BINDINGS || [];
const projectFilter = document.getElementById('projectFilter');
const search = document.getElementById('search');
const summary = document.getElementById('summary');
const out = document.getElementById('rows');
const projects = [...new Map(rows.map(r => [r.project_id, r.product_name])).entries()].sort((a,b)=>a[1].localeCompare(b[1]));
projectFilter.innerHTML = '<option value="">All projects</option>' + projects.map(([id,title]) => `<option value="${id}">${title}</option>`).join('');
const params = new URLSearchParams(location.search);
if (params.get('project')) projectFilter.value = params.get('project');
function escHtml(v){return String(v ?? '').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function filtered(){
  const q = search.value.trim().toLowerCase();
  return rows.filter(r => (!projectFilter.value || r.project_id === projectFilter.value) && (!q || [r.product_name,r.component,r.assigned_source_candidate,r.module_strengthened,r.test_governed,r.design_decision_bolstered].join(' ').toLowerCase().includes(q)));
}
function render(){
  const f = filtered();
  const roles = {};
  const biblio = {};
  for (const r of f){ roles[r.source_role]=(roles[r.source_role]||0)+1; biblio[r.bibliographic_status]=(biblio[r.bibliographic_status]||0)+1; }
  summary.innerHTML = `<div class="card"><h3>Visible Bindings</h3><p class="score">${f.length}</p></div><div class="card"><h3>Source Roles</h3><p>${Object.entries(roles).map(([k,v])=>`${escHtml(k)}: ${v}`).join('<br>')}</p></div><div class="card"><h3>Bibliographic Status</h3><p>${Object.entries(biblio).map(([k,v])=>`${escHtml(k)}: ${v}`).join('<br>')}</p></div>`;
  const shown = f.slice(0,180);
  out.innerHTML = `<table><thead><tr><th>Source</th><th>Project / Component</th><th>Module</th><th>Design Decision</th><th>Test</th><th>Claim Boundary</th></tr></thead><tbody>` +
    shown.map(r => `<tr><td><strong>${escHtml(r.assigned_source_candidate)}</strong><br><span class="small">${escHtml(r.source_role)} / ${escHtml(r.bibliographic_status)}</span></td><td>${escHtml(r.product_name)}<br><span class="small">${escHtml(r.component)}</span></td><td>${escHtml(r.module_strengthened)}</td><td>${escHtml(r.design_decision_bolstered)}</td><td>${escHtml(r.test_governed)}</td><td>${escHtml(r.claim_supported)}<br><span class="small">${escHtml(r.claim_ceiling)}</span></td></tr>`).join('') +
    `</tbody></table><p class="small">Showing ${shown.length} of ${f.length}. Use the CSV for full inspection.</p>`;
}
projectFilter.addEventListener('change', render);
search.addEventListener('input', render);
render();
</script>
</main></body></html>
