<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Proof Maturity Runner</title>
<style>
:root{color-scheme:light;--paper:#f7f5ef;--ink:#142231;--muted:#5c6673;--rule:rgba(31,49,68,.18);--accent:#744c20;--green:#2e5d47;--red:#76313a;--blue:#1e4d6b;--white:rgba(255,255,255,.92)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fbfaf6 0%,var(--paper) 42%,#efebe0 100%);color:var(--ink);font-family:Georgia,'Times New Roman',serif}main{max-width:1240px;margin:0 auto;padding:38px 22px 76px}h1{font-size:clamp(34px,5vw,58px);line-height:1;font-weight:500;margin:0 0 14px}h2{font-size:25px;line-height:1.18;margin:24px 0 10px}h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}p,li{line-height:1.58}.topline,.kicker{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--accent)}.lead{max-width:980px;font-size:18px;line-height:1.62}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card,.panel{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px}.panel{margin:18px 0}.ready{border-left:4px solid var(--green)}.warn{border-left:4px solid var(--accent)}.risk{border-left:4px solid var(--red)}.button{display:inline-block;border:1px solid rgba(30,77,107,.35);border-radius:6px;padding:9px 12px;background:#fff;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;text-decoration:none;margin:3px 6px 3px 0}.score{font-size:32px;line-height:1}.small{font-size:13px;color:var(--muted)}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:top}th{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}input,select{width:100%;border:1px solid var(--rule);border-radius:6px;padding:10px;background:#fff;color:var(--ink)}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,.75fr);gap:14px}@media(max-width:760px){main{padding:28px 18px 58px}.split{grid-template-columns:1fr}}
</style>

<script src="component_proof_maturity.js"></script>
<script>
function esc(s){return String(s||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const level=document.getElementById('level').value;
  const rows=window.COMPONENT_PROOF_MATURITY.filter(r=>{
    const hay=[r.product_name,r.component,r.upgrade_class,r.maturity_level,r.source_candidate,r.operation_to_demonstrate].join(' ').toLowerCase();
    return (!q||hay.includes(q)) && (!level||r.maturity_level===level);
  }).slice(0,120);
  document.getElementById('count').textContent=rows.length+' shown';
  document.getElementById('rows').innerHTML=rows.map(r=>`<div class="card ${Number(r.maturity_score)>=5?'ready':Number(r.maturity_score)>=3?'warn':'risk'}"><h3>${esc(r.project_id)} / ${esc(r.maturity_level)}</h3><h2>${esc(r.component)}</h2><p><b>Mechanism:</b> ${esc(r.operation_to_demonstrate)}</p><p><b>Observable proof:</b> ${esc(r.observable_output)}</p><p><b>Source-bound test:</b> ${esc(r.source_bound_test||'not yet bound')}</p><p><b>Falsifier:</b> ${esc(r.falsification_rule)}</p><p><b>Next build:</b> ${esc(r.next_proof_build_step)}</p>${r.engine_page?`<p><a class="button" href="${esc(r.engine_page)}">Open proof engine</a></p>`:''}</div>`).join('');
}
window.addEventListener('DOMContentLoaded',()=>{render();q.addEventListener('input',render);level.addEventListener('change',render);});
</script>
</head><body><main>
<div class="topline">Interactive proof runner</div>
<h1>Inspect A Component Proof</h1>
<p class="lead">Search a project, component, source, mechanism, or proof class. The runner surfaces the mechanism, observable output, source-bound test, falsifier, and next build action.</p>
<div class="grid"><div><label class="kicker" for="q">Search</label><input id="q" placeholder="Nexus, Poison-RAG, trilogy, retrieval, stale state, source..." /></div><div><label class="kicker" for="level">Maturity level</label><select id="level"><option value="">All levels</option><option>L4 instrumented proof path</option><option>L5 execution-ready proof capsule</option></select></div></div>
<p class="small" id="count"></p>
<section class="grid" id="rows"></section>
</main></body></html>
