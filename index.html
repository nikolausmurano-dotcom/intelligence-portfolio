// ══════════ ARMY HELPER ══════════
function mkArmy(n, w, by, sc, sd, helms, gear) { const a = []; for (let i = 0; i < n; i++) a.push({ x: -40 + H(i * 3.1 + sd) * (w + 80), y: by + (H(i * 7.3 + sd) - .5) * 14, sc: sc * (.5 + H(i * 11.7 + sd) * .55), ph: H(i * 13.9 + sd) * 6.28, spd: .7 + H(i * 17.1 + sd) * .7, mir: H(i * 19.3 + sd) > .65, gear: gear[~~(H(i * 23.7 + sd) * gear.length)], helm: helms[~~(H(i * 29.1 + sd) * helms.length)] }); return a.sort((a2, b) => a2.y - b.y); }

// ═══════════════════════════════════════════════════════════════════════════
//  ARCHETYPE 1: BATTLEFIELD

  ctx.save(); ctx.translate(px * -12, 0); ctx.fillStyle = cfg.c1 || "rgba(20,23,48,.95)"; drawArmy(ctx, cache.a1, t); ctx.restore();

// ═══════════════════════════════════════════════════════════════════════════
//  ARCHETYPE 2: SURVEILLANCE
// ═══════════════════════════════════════════════════════════════════════════
function surveillanceScene(ctx, w, h, t, mx, cfg) {
  const ac = cfg.accent || [180, 40, 40], px = (mx - .5) * 2;

  ctx.globalAlpha = .025; for (let y = 0; y < h; y += 3) { ctx.fillStyle = "#fff"; ctx.fillRect(0, y, w, 1); } ctx.globalAlpha = 1;

  ctx.fillStyle = `rgba(200,200,220,${.02 + .01 * Math.sin(t * 12.7) * Math.sin(t * 7.3)})`; ctx.fillRect(0, 0, w, h * .15);

  ctx.fillStyle = "rgba(40,28,16,.12)"; ctx.fillRect(w * .55, h * .08, w * .38, h * .35);
  for (let i = 0; i < 8; i++) { const bx = w * .58 + H(i * 3.1) * w * .3, by = h * .12 + H(i * 7.3) * h * .24; ctx.fillStyle = `rgba(${ac[0]},${ac[1]},${ac[2]},.1)`; ctx.fillRect(bx - 10, by - 10, 20, 24); ctx.fillStyle = `rgba(${ac[0]},${ac[1]},${ac[2]},.08)`; ctx.beginPath(); ctx.arc(bx, by - 8, 1.5, 0, Math.PI * 2); ctx.fill(); }
  // Red string
  ctx.strokeStyle = `rgba(${ac[0]},40,40,.06)`; ctx.lineWidth = .5;
  for (let i = 0; i < 6; i++) { const x1 = w * .58 + H(i * 3.1) * w * .3, y1 = h * .12 + H(i * 7.3) * h * .24, x2 = w * .58 + H((i + 3) * 3.1) * w * .3, y2 = h * .12 + H((i + 3) * 7.3) * h * .24; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.quadraticCurveTo((x1 + x2) / 2, (y1 + y2) / 2 + 15, x2, y2); ctx.stroke(); }

  for (let i = 0; i < 5; i++) { const ba = H(i * 5.1) * Math.PI * 2, bd = H(i * 9.3) * rr * .9; if (Math.sin(t * 3 + i * 2) > .3) { ctx.fillStyle = `rgba(${ac[0]},${ac[1]},${ac[2]},.2)`; ctx.beginPath(); ctx.arc(rx + Math.cos(ba) * bd, ry + Math.sin(ba) * bd, 2, 0, Math.PI * 2); ctx.fill(); } }

  for (let i = 0; i < 8; i++) { const ly = my3 - 28 + i * 8 + ((t * 15) % 8); if (ly > my3 - 35 && ly < my3 + 35) { ctx.fillStyle = `rgba(${ac[0]},${ac[1]},${ac[2]},.18)`; ctx.fillText(`${H(i * 3 + ~~t) > .5 ? 'SIGINT' : 'HUMINT'} // ${String(~~(H(i + ~~(t * 2)) * 9999999)).padStart(7, '0')}`, mx3 - 48, ly); } }

  for (let i = 0; i < 16; i++) { const ly = docY + 12 + i * h * .022, lw = 30 + H(i + 5) * w * .25; ctx.fillStyle = "rgba(100,90,80,.03)"; ctx.fillRect(docX + 12, ly, lw, 3); if (H(i + 10) > .45) { ctx.fillStyle = `rgba(${ac[0]},${ac[1]},${ac[2]},.05)`; ctx.fillRect(docX + 12 + H(i * 2) * 20, ly, 20 + H(i * 3) * 40, 3); } }

// ═══════════════════════════════════════════════════════════════════════════
//  ARCHETYPE 3: CEREBRAL
// ═══════════════════════════════════════════════════════════════════════════
function cerebralScene(ctx, w, h, t, mx, cfg) {
  ctx.fillStyle = cfg.bg || "#06061a"; ctx.fillRect(0, 0, w, h);
  const ac = cfg.accent || [100, 80, 200], nodes = cfg.nodes || [];

  // Deep bg neural mesh
  ctx.globalAlpha = .02; ctx.strokeStyle = `rgb(${ac[0]},${ac[1]},${ac[2]})`; ctx.lineWidth = .3;
  for (let i = 0; i < 60; i++) { ctx.beginPath(); ctx.moveTo(H(i * 2.1) * w, H(i * 4.3) * h); ctx.lineTo(H(i * 6.7) * w, H(i * 8.9) * h); ctx.stroke(); }
  ctx.globalAlpha = 1;

  // EEG waveforms
  for (let ch = 0; ch < 4; ch++) { const ey = h * .06 + ch * h * .04; ctx.strokeStyle = `rgba(${ac[0]},${ac[1]},${ac[2]},.08)`; ctx.lineWidth = .8; ctx.beginPath(); for (let x = 0; x < w; x += 2) { const v = Math.sin((x + t * 80 + ch * 40) * .02) * 6 + Math.sin((x + t * 120 + ch * 70) * .05) * 3 + Math.sin((x + t * 200) * .1) * 2 * (Math.sin(t * .8 + ch) > .7 ? 3 : 1); x === 0 ? ctx.moveTo(x, ey + v) : ctx.lineTo(x, ey + v); } ctx.stroke(); }

  // Synaptic connections with firing pulses
  for (let i = 0; i < nodes.length; i++) for (let j = i + 1; j < nodes.length; j++) {
    const ni = nodes[i], nj = nodes[j], dx = ni[0] - nj[0], dy = ni[1] - nj[1], dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < .32) {
      const firing = Math.sin(t * 3 + i * 2.3 + j * 1.7) > .6;
      ctx.strokeStyle = `rgba(${ac[0]},${ac[1]},${ac[2]},${firing ? .12 : .03})`; ctx.lineWidth = firing ? 1 : .3;
      ctx.beginPath(); ctx.moveTo(ni[0] * w, ni[1] * h); ctx.lineTo(nj[0] * w, nj[1] * h); ctx.stroke();
      if (firing) { const tp = ((t * 2 + i + j) % 1), ppx = Lr(ni[0], nj[0], tp) * w, ppy = Lr(ni[1], nj[1], tp) * h;
        ctx.fillStyle = `rgba(${Math.min(255, ac[0] + 80)},${Math.min(255, ac[1] + 80)},${ac[2]},.3)`;
        ctx.beginPath(); ctx.arc(ppx, ppy, 2, 0, Math.PI * 2); ctx.fill();
        const pg = ctx.createRadialGradient(ppx, ppy, 0, ppx, ppy, 12); pg.addColorStop(0, `rgba(${ac[0]},${ac[1]},${ac[2]},.08)`); pg.addColorStop(1, "rgba(0,0,0,0)"); ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(ppx, ppy, 12, 0, Math.PI * 2); ctx.fill();
      }
    }

// ═══════════════════════════════════════════════════════════════════════════

  const M = "'IBM Plex Mono', monospace";
  const mxPx = mx * w, myPx = my * h;
  const prox = (px, py, r) => Math.max(0, 1 - Math.sqrt((mxPx - px) ** 2 + (myPx - py) ** 2) / r);

    ctx.font = (bold ? 'bold ' : '') + Math.max(sz, 8) + 'px ' + M; ctx.textAlign = al || "left";
    // Dark shadow for legibility
    ctx.fillStyle = 'rgba(3,4,16,.55)';
    ctx.fillText(str, x + .6, y + .8);
    // Glow backing
    const parts = col.match(/rgba\(([^)]+)\)/);
    if (parts) { const vals = parts[1].split(','); ctx.fillStyle = 'rgba(' + vals[0] + ',' + vals[1] + ',' + vals[2] + ',' + Math.min(1, parseFloat(vals[3]) * .55).toFixed(3) + ')';
      ctx.fillText(str, x + .4, y + .4); }
    ctx.fillStyle = col; ctx.fillText(str, x, y);
  };
  const box = (x, y, bw, bh, col, alpha) => {
    // Dark backdrop for readability
    ctx.fillStyle = `rgba(3,4,16,${(alpha * 1.8).toFixed(3)})`;
    ctx.fillRect(x, y, bw, bh);
    ctx.fillStyle = col.replace(/[\d.]+\)$/, (alpha * .35).toFixed(3) + ')');
    ctx.fillRect(x, y, bw, bh);
    ctx.strokeStyle = col.replace(/[\d.]+\)$/, (alpha * .9).toFixed(3) + ')');

    ctx.fillStyle = `rgba(${ac},.1)`; ctx.fillRect(0, h * .055, w, 16);

    { id: "hostomel", x: 276, y: 193, phase: 4, label: "HOSTOMEL AIRBORNE ASSAULT",
      detail: "VDV airborne forces seized Hostomel/Antonov Airport on Day 1 via helicopter assault. Intended as an airhead for Il-76 transport aircraft to fly in follow-on forces and decapitate Kyiv. Failed because: (1) Ukrainian National Guard 4th Rapid Reaction Brigade counterattacked within hours, (2) Il-76 transports were shot down or turned back, (3) without reinforcement the VDV were isolated and eventually pushed out. The assault demonstrated that airborne operations without ground linkup are suicidal — a lesson the Soviets learned at Vyazma (1942) and apparently forgot.",

      detail: "13 Ukrainian border guards on Zmiinyi (Snake) Island were ordered to surrender by the Moskva cruiser. Their response became the defining moment of the war's first day. The garrison was initially reported killed but survived as POWs. The island was later recaptured by Ukraine using Bayraktar TB2 drones and Harpoon anti-ship missiles. Snake Island demonstrated that symbolic resistance creates strategic narrative effects far exceeding tactical significance.",

    { id: "moskva_sinking", x: 220, y: 395, phase: 4, label: "SINKING OF MOSKVA (FLAGSHIP)",
      detail: "On April 14, 2022, the Black Sea Fleet flagship Moskva (Slava-class guided missile cruiser) was struck by two Ukrainian Neptune anti-ship missiles and sank. It was the largest warship sunk in combat since the Falklands War (1982). The Moskva was providing the fleet's air defense umbrella — its loss degraded Russian naval air defense across the entire Black Sea. Ukraine had no navy to speak of. They sank the enemy flagship with a domestically-produced missile that entered service only in 2021.",
      type: "tactical_success" },
    { id: "kherson_bridges", x: 275, y: 315, phase: 4, label: "KHERSON BRIDGE TARGETING CAMPAIGN",
      detail: "Rather than directly assaulting Russian positions west of the Dnieper, Ukraine systematically targeted the bridges connecting Kherson to Russian supply lines using HIMARS precision strikes. The Antonivskyi Bridge and Kakhovka Dam road crossing were rendered unusable for heavy vehicles over weeks of strikes. With logistics severed, the Russian garrison of ~30,000 troops west of the Dnieper became unsustainable. Russia withdrew in November 2022 — the only voluntary retreat of the war. Ukraine won Kherson by attacking logistics, not forces.",
      type: "tactical_success" },
    { id: "industroyer2", x: 500, y: 120, phase: 3, label: "INDUSTROYER2 CYBER PRE-POSITIONING",
      detail: "GRU Unit 74455 (Sandworm) had pre-positioned Industroyer2 malware in Ukrainian power grid control systems months before the invasion. On the evening of April 8, the malware was activated targeting high-voltage substations. It was detected and neutralized by Ukrainian CERT-UA with support from ESET and Microsoft within hours. Industroyer2 was a variant of the 2016 Industroyer malware that caused the first confirmed cyber-induced power outage in history (Kyiv, December 2016). The pre-positioning timeline proved that cyber operations were planned as an integral part of the invasion — not improvised.",

    pagesVisited: {},
    stationsCompleted: {},
    decisionsResolved: {},
    engageType: null,
    coursesViewed: {},
  });

  useEffect(function() {
    if (view && !session.pagesVisited[view]) {
      setSession(function(prev) {
        var next = Object.assign({}, prev);
        next.pagesVisited = Object.assign({}, prev.pagesVisited);
        next.pagesVisited[view] = true;
        return next;
      });
    }

    var shellPages = ['dashboard','about','expertise','experience','contact'];
    var pagesCount = shellPages.filter(function(p) { return session.pagesVisited[p]; }).length;
    var stationsCount = Object.keys(session.stationsCompleted).length;
    var decisionsCount = Object.keys(session.decisionsResolved).length;
    return {
      pagesVisited: pagesCount,
      pagesTotal: 6,
      stationsCompleted: stationsCount,
      stationsTotal: 6,
      decisionsResolved: decisionsCount,
      decisionsTotal: 6,
      engageType: session.engageType,
      hasActivity: pagesCount > 1 || stationsCount > 0 || decisionsCount > 0,
    };
  }, [session]);

  var recordStation = useCallback(function(stationId, score, total) {
    setSession(function(prev) {
      var next = Object.assign({}, prev);
      next.stationsCompleted = Object.assign({}, prev.stationsCompleted);
      next.stationsCompleted[stationId] = { score: score, total: total };
      return next;

  }, []);
